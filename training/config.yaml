# go-bot AlphaZero training configuration (9x9 defaults).
# Every key mirrors a field of azero.config.Config.

# Game
board_size: 9
komi: 7.5
history_planes: 4

# Network
blocks: 6
filters: 64

# MCTS
simulations: 160
c_puct: 1.5
dirichlet_alpha: 0.3
dirichlet_eps: 0.25
temperature_moves: 12

# Self-play
games_per_iteration: 256        # raise on GPU: more games = wider inference batch
workers: 4                      # CPU path only (selfplay_device: cpu)
selfplay_device: cuda           # cuda -> batched in-process GPU self-play; auto-falls back to cpu
selfplay_parallel_games: 128    # concurrent games per GPU batch (0 = auto)
max_game_moves: 0               # 0 = 2 * board_size^2

# Replay buffer
buffer_size: 100000
min_buffer_size: 2000

# Optimization
batch_size: 1024           # H100 has ample memory; large batches keep it busy
train_steps_per_iteration: 200
learning_rate: 0.001
weight_decay: 0.0001
value_loss_weight: 1.0

# Evaluation / promotion
eval_games: 20
promotion_win_rate: 0.55
eval_simulations: 80

# Loop / IO
iterations: 100
device: cuda               # automatically falls back to cpu
run_dir: runs/9x9-base
checkpoint_dir: checkpoints
