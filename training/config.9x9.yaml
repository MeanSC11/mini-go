# go-bot AlphaZero training configuration — 9x9.
# Every key mirrors a field of azero.config.Config.
# Time budget: smallest/cheapest board — target ~8h of the ~55h total.

# Game
board_size: 9
komi: 7.5
history_planes: 4

# Network
blocks: 6
filters: 64

# MCTS
simulations: 160
c_puct: 1.5
dirichlet_alpha: 0.3
dirichlet_eps: 0.25
temperature_moves: 12

# Self-play
games_per_iteration: 200        # more games = wider inference batch on GPU
workers: 16                     # MCTS worker processes; ~= CPU cores
selfplay_device: cuda           # device for the central inference server; auto-falls back to cpu
selfplay_concurrent_games: 16   # games in flight per worker (batch multiplier)
max_game_moves: 0               # 0 = 2 * board_size^2

# Inference server (batched GPU evaluation)
inference_max_batch: 256        # fire a forward once this many positions are queued...
inference_timeout_ms: 5.0       # ...or after this long, whichever comes first
precision: auto                 # auto|bf16|fp16|fp32 (auto: bf16 on Ampere+/Hopper)

# Replay buffer
buffer_size: 100000
min_buffer_size: 2000

# Optimization
batch_size: 1024           # H100 80GB has ample memory; large batches keep it busy
train_steps_per_iteration: 200
learning_rate: 0.001
weight_decay: 0.0001
value_loss_weight: 1.0

# Evaluation / promotion
eval_games: 20
promotion_win_rate: 0.55
eval_simulations: 80

# Loop / IO
iterations: 120            # calibrate: iterations = target_hours * 3600 / sec_per_iter
device: cuda               # automatically falls back to cpu
run_dir: runs/9x9
checkpoint_dir: checkpoints/9x9
